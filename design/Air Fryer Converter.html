<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Air Fryer Converter</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; background:#E9E2D2; min-height:100vh; -webkit-font-smoothing:antialiased; }
  .stage { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; box-sizing:border-box; }
  body { background: radial-gradient(circle at 30% 10%, #F1E8D6 0%, #E2D6BD 60%, #D6C9AB 100%); }
</style>
<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#FAF5EC"/>
    <circle cx="50" cy="46" r="22" fill="#C2562E"/>
    <text x="50" y="54" font-family="serif" font-size="22" font-weight="600" fill="#FFF7EE" text-anchor="middle">°</text>
  </svg>
</template>
</head>
<body>
<div class="stage"><div id="root"></div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "primaryColor": "#a56a55",
  "background": "#FAF5EC",
  "cardStyle": "soft",
  "showAds": true,
  "displayFont": "Fraunces"
}/*EDITMODE-END*/;

const SEED = [
  { id: 's1', name: 'Crispy fries',     emoji: '🍟', unit: 'F', ovenTemp: 425, ovenTime: 25, afTemp: 400, afTime: 20, note: 'Shake at 10 min' },
  { id: 's2', name: 'Chicken wings',    emoji: '🍗', unit: 'F', ovenTemp: 400, ovenTime: 35, afTemp: 375, afTime: 28, note: 'Pat dry first' },
  { id: 's3', name: 'Salmon fillet',    emoji: '🐟', unit: 'F', ovenTemp: 400, ovenTime: 18, afTemp: 375, afTime: 14, note: '' },
  { id: 's4', name: 'Brussels sprouts', emoji: '🥬', unit: 'F', ovenTemp: 425, ovenTime: 20, afTemp: 400, afTime: 16, note: 'Cut in half' },
];

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const [unit, setUnit] = React.useState('F');
  const [ovenTemp, setOvenTemp] = React.useState(425);
  const [ovenTime, setOvenTime] = React.useState(25);
  const [direction, setDirection] = React.useState('oven-to-air');
  const [view, setView] = React.useState('converter'); // 'converter' | 'saved'
  const [showSave, setShowSave] = React.useState(false);
  const [showSettings, setShowSettings] = React.useState(false);
  const [items, setItems] = React.useState(SEED);
  const [draft, setDraft] = React.useState({ name: '', emoji: '🍟', note: '' });
  const [toast, setToast] = React.useState(null);

  const result = convert(ovenTemp, unit, ovenTime, direction);
  // Always derive both oven + air values, regardless of direction
  const ovenValues = direction === 'oven-to-air'
    ? { temp: ovenTemp, time: ovenTime }
    : { temp: result.temp, time: result.time };
  const airValues = direction === 'oven-to-air'
    ? { temp: result.temp, time: result.time }
    : { temp: ovenTemp, time: ovenTime };

  const openSave = () => {
    const guess = FOOD_PRESETS.find(p => Math.abs((unit === 'F' ? p.tempF : fToC(p.tempF)) - ovenValues.temp) < 5 && Math.abs(p.time - ovenValues.time) < 5);
    setDraft({ name: guess ? guess.name : '', emoji: guess ? guess.emoji : '🍟', note: '' });
    setShowSave(true);
  };
  const doSave = () => {
    const newItem = {
      id: 's' + Date.now(),
      name: draft.name.trim(),
      emoji: draft.emoji || '🍽️',
      unit,
      ovenTemp: ovenValues.temp,
      ovenTime: ovenValues.time,
      afTemp: airValues.temp,
      afTime: airValues.time,
      note: draft.note.trim(),
    };
    setItems([newItem, ...items]);
    setShowSave(false);
    setToast('Saved to recipes');
    setTimeout(() => setToast(null), 1800);
  };
  const doDelete = (id) => setItems(items.filter(i => i.id !== id));

  // Apply tweak background
  const cream = t.background;

  // Override C.cream live for this render
  const localC = { ...C, cream, terracotta: t.primaryColor };

  // CardStyle injects shadow vs outlined look — done via CSS var on root
  React.useEffect(() => {
    const root = document.documentElement;
    root.style.setProperty('--card-shadow',
      t.cardStyle === 'flat' ? 'none'
      : t.cardStyle === 'outlined' ? `inset 0 0 0 1px ${C.ink10}`
      : `0 1px 2px ${C.ink06}`
    );
  }, [t.cardStyle]);

  return (
    <>
      <IOSDevice width={402} height={874}>
        <div style={{ position: 'relative', height: '100%', background: cream, overflow: 'hidden' }}>
          <div style={{
            position: 'absolute', inset: 0,
            transform: view === 'saved' ? 'translateX(-100%)' : 'translateX(0)',
            transition: 'transform 320ms cubic-bezier(0.32,0.72,0.26,1)',
          }}>
            <ConverterScreen
              unit={unit} setUnit={setUnit}
              ovenTemp={ovenTemp} setOvenTemp={setOvenTemp}
              ovenTime={ovenTime} setOvenTime={setOvenTime}
              direction={direction} setDirection={setDirection}
              onOpenSaved={() => setView('saved')}
              onOpenSettings={() => setShowSettings(true)}
              onSave={openSave}
            />
          </div>
          <div style={{
            position: 'absolute', inset: 0,
            transform: view === 'saved' ? 'translateX(0)' : 'translateX(100%)',
            transition: 'transform 320ms cubic-bezier(0.32,0.72,0.26,1)',
          }}>
            <SavedScreen items={items} onClose={() => setView('converter')} onDelete={doDelete} unit={unit} />
          </div>

          <SaveSheet
            visible={showSave} onClose={() => setShowSave(false)} onSave={doSave}
            draft={draft} setDraft={setDraft}
            ovenValues={ovenValues} airValues={airValues}
            unit={unit} direction={direction}
          />
          <SettingsSheet
            visible={showSettings} onClose={() => setShowSettings(false)}
            unit={unit} setUnit={setUnit}
          />

          {/* Toast */}
          {toast && (
            <div style={{
              position: 'absolute', bottom: 56, left: '50%', transform: 'translateX(-50%)',
              background: C.ink, color: '#FFF7EE',
              padding: '10px 18px', borderRadius: 999,
              fontFamily: FONT_UI, fontSize: 14, fontWeight: 500,
              boxShadow: '0 8px 24px rgba(0,0,0,0.25)', zIndex: 200,
            }}>{toast}</div>
          )}
        </div>
      </IOSDevice>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Theme">
          <TweakColor  label="Primary"     value={t.primaryColor} onChange={(v) => setTweak('primaryColor', v)} />
          <TweakColor  label="Background"  value={t.background}   onChange={(v) => setTweak('background', v)} />
        </TweakSection>
        <TweakSection label="Style">
          <TweakRadio label="Cards" value={t.cardStyle}
            options={['flat', 'soft', 'outlined']}
            onChange={(v) => setTweak('cardStyle', v)} />
        </TweakSection>
        <TweakSection label="Suggestions">
          <div style={{ fontSize: 11, lineHeight: 1.5, color: 'rgba(41,38,27,0.72)' }}>
            Future ideas: built-in cook timer, “shake halfway” nudge, voice input, share-as-text, recipe library.
          </div>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
